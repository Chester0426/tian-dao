# Test fixture: Auth + testing without database (partial assumes)
# Exercises the testing stack's partial-assumes path: auth present, database absent.
# Tests use the No-Auth Fallback because database (an assumed dependency) is missing.
idea:
  name: test-auth-tests
  type: web-app

  description: |
    Users want to validate an authenticated workflow backed by a third-party API
    before investing in a database layer. An authenticated app with Supabase Auth
    (standalone client) and Playwright E2E tests running via the No-Auth Fallback
    path — no database, no global-setup/teardown.

  thesis: "If we provide an auth-gated app with external API data, then at least 20 users will sign up, as measured by signups in 1 week"

  target_user: Developers prototyping auth-gated features without a database

  distribution: |
    Share in developer communities and forums.

  golden_path:
    - step: Visit landing page
      event: visit_landing
      page: landing
    - step: Open registration form
      event: signup_start
      page: signup
    - step: Complete account registration
      event: signup_complete
      page: signup
    - step: View dashboard with external API data
      event: activate
      page: dashboard


  stack:
    services:
      - name: app
        runtime: nextjs
        hosting: vercel
        ui: shadcn
        testing: playwright
    auth: supabase
    analytics: posthog

events:
  standard_funnel:
    - event: visit_landing
      trigger: User loads the landing page
    - event: signup_start
      trigger: User opens the registration form
    - event: signup_complete
      trigger: User successfully creates an account
    - event: activate
      trigger: User views their dashboard for the first time
    - event: retain_return
      trigger: User returns after 24+ hours
  custom_events: []

assertions:
  payment_events_required: false
  activate_required: true
  skippable_events: []
  min_pages: 4
