# Test fixture: Service with database + auth — API endpoints with persistent storage
# Validates that service archetype works with database and auth stacks.
experiment:
  name: test-service-with-db
  type: service

  description: |
    Teams need a simple feature flag API to control rollouts without redeploying.
    A lightweight feature flag service with endpoints for flag management and evaluation.

  thesis: "If we provide a simple feature flag API, then engineering teams will use it to control rollouts, as measured by flags evaluated per day"
  target_user: Engineering teams managing feature rollouts

  distribution: |
    Internal team distribution via API docs.

  behaviors:
    - id: b-01
      hypothesis_id: h-01
      given: "An authenticated user calls the flag-evaluate endpoint"
      when: "They provide a flag name and user ID"
      then: "They receive the flag evaluation result"
      tests:
        - "Flag evaluation returns boolean result"
        - "Unauthenticated requests are rejected"
      level: 1

  endpoints:
    - name: flags
      purpose: List all feature flags
    - name: flag-evaluate
      purpose: Evaluate a feature flag for a given user
    - name: flag-create
      purpose: Create a new feature flag


  stack:
    services:
      - name: api
        runtime: nextjs
        hosting: vercel
    database: supabase
    auth: supabase
    analytics: posthog

events:
  activate:
    funnel_stage: activate
    trigger: User evaluates a feature flag via the API
  retain_return:
    funnel_stage: retain
    trigger: User makes a request after 24+ hours since last call

assertions:
  payment_events_required: false
  skippable_events: [visit_landing, signup_start, signup_complete]
  min_endpoints: 3
