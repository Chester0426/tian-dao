# Test fixture: Full-stack app (mirrors quickbill example)
# All stack categories present: auth, payment, database, analytics, etc.
experiment:
  name: test-full-stack
  type: web-app

  description: |
    Freelancers billing fewer than 5 clients per month waste time on invoicing,
    bouncing between spreadsheets and manual payment follow-ups. A single-page
    invoicing tool where freelancers create an invoice in under 60 seconds,
    send a payment link to clients, and get notified when paid.

  thesis: "If freelancers can create invoices in under 60 seconds, then at least 10 will send a paid invoice, as measured by paid invoices within 2 weeks"

  target_user: Freelance designers and developers billing 1-5 clients per month

  distribution: |
    Post launch in r/freelance and Indie Hackers. LinkedIn posts targeting freelancers.

  level: 3

  hypotheses:
    - id: h-01
      category: demand
      statement: "At least 5% of landing visitors will click the CTA"
      metric:
        formula: "cta_click / visit_landing"
        threshold: 0.05
        operator: gte
      priority_score: 90
      experiment_level: 1
      depends_on: []
      status: pending
    - id: h-02
      category: feasibility
      statement: "Invoice creation works in under 60 seconds"
      metric:
        formula: "activate / signup_complete"
        threshold: 0.30
        operator: gte
      priority_score: 80
      experiment_level: 2
      depends_on: [h-01]
      status: pending
    - id: h-03
      category: monetize
      statement: "At least 20% of active users will start checkout"
      metric:
        formula: "pay_start / activate"
        threshold: 0.20
        operator: gte
      priority_score: 70
      experiment_level: 3
      depends_on: [h-02]
      status: pending

  behaviors:
    - id: b-01
      hypothesis_id: h-01
      given: "A visitor lands on the landing page"
      when: "They see the CTA"
      then: "They click the CTA button"
      tests:
        - "Landing page renders CTA button"
        - "Clicking CTA navigates to signup"
      level: 1
    - id: b-02
      hypothesis_id: h-02
      given: "A logged-in user is on the invoice-create page"
      when: "They fill in line items and click send"
      then: "An invoice is created and a payment link is generated"
      tests:
        - "Invoice form accepts line items and submits"
        - "Payment link is generated after invoice creation"
      level: 2

  golden_path:
    - step: Visit landing page
      event: visit_landing
      page: landing
    - step: Open registration form
      event: signup_start
      page: signup
    - step: Complete account registration
      event: signup_complete
      page: signup
    - step: Create first invoice
      event: activate
      page: invoice-create
    - step: View invoice with pay button
      event: pay_start
      page: invoice-view

  funnel:
    available_from:
      reach: L1
      demand: L1
      activate: L2
      monetize: L2
      retain: L3
    decision_framework:
      scale: "All tested dimensions >= 1.0"
      kill: "Any top-funnel (REACH or DEMAND) < 0.5"
      pivot: "2+ dimensions < 0.8"
      refine: "1+ dimensions < 1.0 but fewer than 2 below 0.8"


  stack:
    services:
      - name: app
        runtime: nextjs
        hosting: vercel
        ui: shadcn
    database: supabase
    auth: supabase
    analytics: posthog
    payment: stripe

events:
  visit_landing:
    funnel_stage: reach
    trigger: User loads the landing page
  signup_start:
    funnel_stage: demand
    trigger: User opens the registration form
  signup_complete:
    funnel_stage: demand
    trigger: User successfully creates an account
  activate:
    funnel_stage: activate
    trigger: User creates their first invoice
  retain_return:
    funnel_stage: retain
    trigger: User returns after 24+ hours
  pay_start:
    funnel_stage: monetize
    requires: [payment]
    trigger: Client clicks pay button on invoice
  pay_success:
    funnel_stage: monetize
    requires: [payment]
    trigger: Payment confirmed via Stripe webhook

assertions:
  payment_events_required: true
  activate_required: true
  skippable_events: []
  min_pages: 4
