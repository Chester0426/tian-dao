# Test fixture: Full-stack app (mirrors quickbill example)
# All stack categories present: auth, payment, database, analytics, etc.
idea:
  name: test-full-stack
  title: FullStack — Complete MVP with Auth, Payment, and Database
  owner: tester
  template_repo: acme/experiment-template
  type: web-app

  problem: |
    Freelancers billing fewer than 5 clients per month waste time on invoicing.
    They bounce between spreadsheets and manual payment follow-ups.

  solution: |
    A single-page invoicing tool where freelancers create an invoice in under 60 seconds,
    send a payment link to clients, and get notified when paid.

  target_user: Freelance designers and developers billing 1-5 clients per month

  distribution: |
    Post launch in r/freelance and Indie Hackers. LinkedIn posts targeting freelancers.

  pages:
    - name: landing
      purpose: Explain value prop, show pricing, collect signups
    - name: signup
      purpose: Email/password registration form
    - name: login
      purpose: Email/password login form
    - name: dashboard
      purpose: List all invoices with status and total revenue
    - name: invoice-create
      purpose: Form to create a new invoice with line items
    - name: invoice-view
      purpose: Public shareable invoice page with pay button
    - name: settings
      purpose: Profile, business details, Stripe connection

  features:
    - Create invoices with line items, tax, and due date
    - Send invoice link to client via email
    - Stripe checkout for client payments
    - Dashboard showing invoice statuses and total revenue
    - Email reminders for overdue invoices

  primary_metric: Paid invoices
  target_value: "10 freelancers send at least 1 paid invoice"
  measurement_window: 2 weeks

  stack:
    framework: nextjs
    hosting: vercel
    database: supabase
    auth: supabase
    analytics: posthog
    ui: shadcn
    payment: stripe

  level: 3
  thesis: "If freelancers can create invoices in under 60 seconds, at least 10 will send a paid invoice within 2 weeks"

  hypotheses:
    - id: h_demand_1
      category: demand
      statement: "At least 5% of landing visitors will click the CTA"
      test_method: "A/B landing page with analytics"
      success_metric: "CTA click-through rate"
      threshold: ">5% CTR"
      priority_score: 9
      experiment_level: 1
      depends_on: []
      status: pending
    - id: h_feasibility_1
      category: feasibility
      statement: "Invoice creation works in under 60 seconds"
      test_method: "Build and measure time-to-complete"
      success_metric: "Median time to first sent invoice"
      threshold: "<60 seconds"
      priority_score: 8
      experiment_level: 2
      depends_on: [h_demand_1]
      status: pending
    - id: h_monetize_1
      category: monetize
      statement: "At least 20% of active users will start checkout"
      test_method: "Stripe integration with analytics"
      success_metric: "Checkout start rate"
      threshold: ">20% of active users"
      priority_score: 7
      experiment_level: 3
      depends_on: [h_feasibility_1]
      status: pending

  behaviors:
    - id: b_1
      hypothesis_id: h_demand_1
      given: "A visitor lands on the landing page"
      when: "They see the CTA"
      then: "They click the CTA button"
      level: 1
    - id: b_2
      hypothesis_id: h_feasibility_1
      given: "A logged-in user is on the invoice-create page"
      when: "They fill in line items and click send"
      then: "An invoice is created and a payment link is generated"
      level: 2

  funnel:
    thresholds:
      visit_to_cta: ">5%"
      cta_to_signup: ">15%"
      signup_to_activate: ">30%"
      activate_to_pay: ">20%"
    decision_framework: |
      CONTINUE if: CTR >5% AND signup >15%
      PIVOT if: CTR >3% but signup <10%
      KILL if: CTR <3% after 200 visitors

events:
  standard_funnel:
    - event: visit_landing
      trigger: User loads the landing page
    - event: signup_start
      trigger: User opens the registration form
    - event: signup_complete
      trigger: User successfully creates an account
    - event: activate
      trigger: User creates their first invoice
    - event: retain_return
      trigger: User returns after 24+ hours
  payment_funnel:
    - event: pay_start
      trigger: Client clicks pay button on invoice
    - event: pay_success
      trigger: Payment confirmed via Stripe webhook
  custom_events: []

assertions:
  payment_events_required: true
  activate_required: true
  skippable_events: []
  min_pages: 7
