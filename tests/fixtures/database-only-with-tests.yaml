# Test fixture: Database (supabase) without auth, with Playwright testing
# Exercises the no-auth-fallback testing path with database present —
# verifies that no-auth CI template handles database env vars correctly.
idea:
  name: test-db-only-tests
  type: web-app

  description: |
    Users need a public data browser to explore open datasets without needing to sign in.
    A public app backed by Supabase for data storage, with E2E tests to verify the browsing flow.

  thesis: "If we provide a public data browser with filters, then at least 100 users will browse the dataset, as measured by browse page visits in 1 week"

  target_user: Data enthusiasts exploring open datasets

  distribution: |
    Share in data communities and forums.

  behaviors:
    - id: b-01
      hypothesis_id: h-01
      given: "A visitor lands on the landing page"
      when: "They click browse"
      then: "They navigate to the browse page"
      tests:
        - "Landing page renders browse CTA"
      level: 1
    - id: b-02
      hypothesis_id: h-02
      given: "A visitor is on the browse page"
      when: "They apply a filter"
      then: "The data list updates"
      tests:
        - "Browse page renders filter controls"
        - "Applying filter fires activate event"
      level: 1

  golden_path:
    - step: Visit landing page
      event: visit_landing
      page: landing
    - step: Apply a filter on the browse page
      event: activate
      page: browse


  stack:
    services:
      - name: app
        runtime: nextjs
        hosting: vercel
        ui: shadcn
        testing: playwright
    database: supabase
    analytics: posthog

events:
  standard_funnel:
    - event: visit_landing
      trigger: User loads the landing page
    - event: activate
      trigger: User applies a filter on the browse page
    - event: retain_return
      trigger: User returns after 24+ hours
  custom_events: []

assertions:
  payment_events_required: false
  activate_required: true
  skippable_events: [signup_start, signup_complete]
  min_pages: 2
