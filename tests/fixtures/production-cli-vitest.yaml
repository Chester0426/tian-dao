# Test fixture: CLI with production quality — validates quality: production + vitest + cli
# Validates that harden/change/verify correctly handle TDD path for cli archetype.
experiment:
  name: test-production-cli
  type: cli
  quality: production

  description: |
    A production-grade service monitor CLI with specification tests
    and TDD workflow for cli archetype.

  thesis: "If we provide a service monitor CLI, then DevOps engineers will use it, as measured by CLI installs per week"
  target_user: DevOps engineers managing production services

  distribution: |
    Published to npm registry and shared in DevOps communities.

  behaviors:
    - id: b-01
      hypothesis_id: h-01
      given: "A DevOps engineer runs the deploy command"
      when: "They specify a service name"
      then: "The service is deployed to the platform"
      tests:
        - "Deploy command initiates deployment"
      level: 1

  commands:
    - name: deploy
      purpose: Deploy a service to the platform
    - name: status
      purpose: Check current status of a deployment
    - name: logs
      purpose: Stream or fetch recent logs for a service


  stack:
    services:
      - name: cli
        runtime: commander
        testing: vitest
    analytics: posthog

events:
  standard_funnel:
    - event: activate
      trigger: User completes their first deployment via the CLI
    - event: retain_return
      trigger: User runs the CLI again after 24+ hours since last use
  custom_events: []

assertions:
  payment_events_required: false
  skippable_events: [visit_landing, signup_start, signup_complete]
  min_commands: 3
