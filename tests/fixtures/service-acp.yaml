# Test fixture: Service with Virtuals ACP framework — covers framework/virtuals-acp
# Validates that service archetype works with the ACP Agent stack (protocol agent, not HTTP server).
experiment:
  name: test-service-acp
  type: service

  description: |
    Crypto traders need quick risk assessments for new tokens before investing.
    An ACP agent that performs multi-source token analysis and returns risk reports.

  thesis: "If we provide automated token risk analysis via ACP, then crypto traders will use it before investing, as measured by tasks completed per day"
  target_user: Crypto traders evaluating new token launches

  distribution: |
    Listed on Virtuals Protocol ACP marketplace for agent-to-agent discovery.

  behaviors:
    - id: b-01
      hypothesis_id: h-01
      given: "An ACP task arrives for token analysis"
      when: "The agent processes the task"
      then: "A risk report is generated and returned"
      tests:
        - "Token analysis endpoint returns risk report"
      level: 1

  endpoints:
    - name: analyze-token
      purpose: Multi-source token risk analysis and report generation
    - name: scan-protocol
      purpose: Protocol-level risk scan with TVL and liquidity data


  stack:
    services:
      - name: api
        runtime: virtuals-acp
        hosting: railway
        testing: vitest
    analytics: posthog

events:
  activate:
    funnel_stage: activate
    trigger: Agent completes its first token analysis task
  retain_return:
    funnel_stage: retain
    trigger: Agent receives a task after 24+ hours since last task

assertions:
  payment_events_required: false
  skippable_events: [visit_landing, signup_start, signup_complete]
  min_endpoints: 2
