# Test fixture: Auth without database
# Exercises the auth/supabase standalone client path (no database: supabase).
experiment:
  name: test-auth-only
  type: web-app

  description: |
    Users want a simple authenticated app that stores data in a third-party API
    rather than a traditional database. A lightweight app with Supabase Auth for
    login but no Supabase database — data is fetched from an external API using
    the authenticated user's token.

  thesis: "If we provide a simple auth-gated app backed by an external API, then at least 20 users will sign up, as measured by signups in 1 week"

  target_user: Developers building API-first apps with auth

  distribution: |
    Share in developer communities and forums.

  behaviors:
    - id: b-01
      hypothesis_id: h-01
      given: "A visitor lands on the landing page"
      when: "They click the CTA"
      then: "They navigate to the signup page"
      tests:
        - "Landing page renders CTA button"
        - "Clicking CTA navigates to signup"
      level: 1
    - id: b-02
      hypothesis_id: h-02
      given: "A logged-in user is on the dashboard"
      when: "The page loads"
      then: "They see external API data"
      tests:
        - "Dashboard renders data from external API"
      level: 2

  golden_path:
    - step: Visit landing page
      event: visit_landing
      page: landing
    - step: Open registration form
      event: signup_start
      page: signup
    - step: Complete account registration
      event: signup_complete
      page: signup
    - step: View dashboard with external API data
      event: activate
      page: dashboard


  stack:
    services:
      - name: app
        runtime: nextjs
        hosting: vercel
        ui: shadcn
    auth: supabase
    analytics: posthog

events:
  visit_landing:
    funnel_stage: reach
    trigger: User loads the landing page
  signup_start:
    funnel_stage: demand
    trigger: User opens the registration form
  signup_complete:
    funnel_stage: demand
    trigger: User successfully creates an account
  activate:
    funnel_stage: activate
    trigger: User views their dashboard for the first time
  retain_return:
    funnel_stage: retain
    trigger: User returns after 24+ hours

assertions:
  payment_events_required: false
  activate_required: true
  skippable_events: []
  min_pages: 3
