# Test fixture: CLI with detached surface
# Validates that cli archetype with surface: detached gets a site/index.html marketing page.
idea:
  name: test-surface-cli
  type: cli

  description: |
    Developers want quick insights into their git repository activity.
    A command-line tool that shows commit stats and contributor activity.

  thesis: "If we provide a git stats CLI with a marketing surface, then developers will discover and install it, as measured by CLI installs per week"
  target_user: Developers analyzing repository activity

  distribution: |
    Detached surface page deployed to Vercel drives npm installs.

  behaviors:
    - id: b-01
      hypothesis_id: h-01
      given: "A developer runs the stats command"
      when: "They are in a git repository"
      then: "They see commit statistics"
      tests:
        - "Stats command outputs commit counts"
      level: 1

  commands:
    - name: stats
      purpose: Show commit statistics for the current repository
    - name: contributors
      purpose: List top contributors with activity metrics


  stack:
    services:
      - name: cli
        runtime: commander
    analytics: posthog
    surface: detached

events:
  standard_funnel:
    - event: visit_landing
      trigger: User loads the detached marketing page
    - event: activate
      trigger: User runs their first stats command
    - event: retain_return
      trigger: User runs the CLI again after 24+ hours since last use
  custom_events: []

assertions:
  payment_events_required: false
  skippable_events: [signup_start, signup_complete]
  min_commands: 2
