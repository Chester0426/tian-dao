# Test fixture: Landing-only page, no auth, no payment, no database
# Minimal configuration — just a static marketing page with analytics.
idea:
  name: test-landing-only
  type: web-app

  description: |
    Users need a simple landing page to validate demand before building a product.
    A single static landing page with a CTA to collect interest via email signup form (no auth).

  thesis: "If we publish a landing page with a clear CTA, then at least 50 users will submit their email, as measured by email signups in 1 week"

  target_user: Founders testing market demand

  distribution: |
    Share link in relevant communities and social media.


  golden_path:
    - step: Visit landing page
      event: visit_landing
      page: landing
    - step: Submit email in the interest form
      event: activate
      page: landing

  stack:
    services:
      - name: app
        runtime: nextjs
        hosting: vercel
        ui: shadcn
    analytics: posthog

events:
  standard_funnel:
    - event: visit_landing
      trigger: User loads the landing page
    - event: activate
      trigger: User submits email in the interest form
    - event: retain_return
      trigger: User returns after 24+ hours
  custom_events: []

assertions:
  payment_events_required: false
  activate_required: false
  skippable_events: [signup_start, signup_complete]
  min_pages: 1
