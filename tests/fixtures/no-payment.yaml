# Test fixture: Auth + database but no payment stack
# Tests that payment events (requires: [payment]) are absent when stack.payment is missing.
experiment:
  name: test-no-payment
  type: web-app

  description: |
    Teams need a simple shared notes tool but existing options are too complex.
    A minimal collaborative notes app where teams create, edit, and share notes.
    Free to use — no payment required.

  thesis: "If we provide a dead-simple shared notes tool, then at least 5 teams will create 3+ notes each, as measured by active notes within 2 weeks"

  target_user: Small teams of 2-5 people who need shared notes

  distribution: |
    Post in ProductHunt and relevant Slack communities.

  behaviors:
    - id: b-01
      hypothesis_id: h-01
      given: "A visitor lands on the landing page"
      when: "They see the CTA"
      then: "They click to sign up"
      tests:
        - "Landing page renders CTA button"
        - "Clicking CTA navigates to signup"
      level: 1
    - id: b-02
      hypothesis_id: h-02
      given: "A logged-in user is on the note-edit page"
      when: "They create a note"
      then: "The note is saved"
      tests:
        - "Note form accepts content and submits"
        - "Creating note fires activate event"
      level: 2

  golden_path:
    - step: Visit landing page
      event: visit_landing
      page: landing
    - step: Open registration form
      event: signup_start
      page: signup
    - step: Complete account registration
      event: signup_complete
      page: signup
    - step: Create first note
      event: activate
      page: note-edit


  stack:
    services:
      - name: app
        runtime: nextjs
        hosting: vercel
        ui: shadcn
    database: supabase
    auth: supabase
    analytics: posthog

events:
  visit_landing:
    funnel_stage: reach
    trigger: User loads the landing page
  signup_start:
    funnel_stage: demand
    trigger: User opens the registration form
  signup_complete:
    funnel_stage: demand
    trigger: User successfully creates an account
  activate:
    funnel_stage: activate
    trigger: User creates their first note
  retain_return:
    funnel_stage: retain
    trigger: User returns after 24+ hours

assertions:
  payment_events_required: false
  activate_required: true
  skippable_events: []
  min_pages: 3
