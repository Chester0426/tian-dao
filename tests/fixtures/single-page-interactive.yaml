# Test fixture: Landing-only with an interactive feature (calculator)
# Tests that activate event IS required (unlike landing-only) because
# the page has an interactive feature that delivers value.
experiment:
  name: test-interactive
  type: web-app

  description: |
    Freelancers don't know how much to charge per hour — they guess and often undercharge.
    A single-page hourly rate calculator where you enter your expenses, desired salary,
    and hours available to get your minimum hourly rate instantly.

  thesis: "If freelancers can calculate their ideal hourly rate in under a minute, then at least 100 will complete a calculation, as measured by calculator completions in 1 week"

  target_user: Freelancers who are unsure what hourly rate to charge

  distribution: |
    Post in freelancer communities and share on social media.

  behaviors:
    - id: b-01
      hypothesis_id: h-01
      given: "A freelancer visits the landing page"
      when: "They enter expenses, salary, and hours"
      then: "They see their calculated hourly rate"
      tests:
        - "Calculator form accepts input fields"
        - "Completing calculation fires activate event"
      level: 1

  golden_path:
    - step: Visit landing page
      event: visit_landing
      page: landing
    - step: Complete a rate calculation
      event: activate
      page: landing


  stack:
    services:
      - name: app
        runtime: nextjs
        hosting: vercel
        ui: shadcn
    analytics: posthog

events:
  standard_funnel:
    - event: visit_landing
      trigger: User loads the landing page
    - event: activate
      trigger: User completes a rate calculation
    - event: retain_return
      trigger: User returns after 24+ hours
  custom_events: []

assertions:
  payment_events_required: false
  activate_required: true
  skippable_events: [signup_start, signup_complete]
  min_pages: 1
