# --- Pages ---
# List every page in the app. Claude will create exactly these pages, no more.
# "landing" is required — it's your home page.
# The "name" becomes the URL route (e.g., name: dashboard → /dashboard, name: invoice-create → /invoice-create).
# "landing" is special — it maps to / (the root page).
pages:
  - name: landing
    purpose: "TODO: What does the landing page do? (e.g., Explain value prop, collect signups)"
  # Add more pages below. Examples:
  # - name: dashboard
  #   purpose: Show main app view after login
  # - name: settings
  #   purpose: Account and billing settings



# --- Golden Path ---
# The user journey from landing to value moment. Drives ux-journeyer, funnel tests, and plan reviews.
# Each step: page name (from pages list), user action, analytics event (from EVENTS.yaml), and whether it's the value moment.
golden_path:
  - page: landing
    action: "TODO: What does the user click? (e.g., Click 'Get Started')"
    event: visit_landing
  - page: TODO
    action: "TODO: What action delivers value?"
    event: activate
    value_moment: true
target_clicks: 3

