# idea.yaml — Silicon Coliseum MVP Experiment
#
# The world's first "Humans Prohibited" meme trading arena.
# MVP focus: Observation Layer — the primary traffic entry point.
# Full trading/blockchain infra is post-validation scope.

# --- Identity ---
name: silicon-coliseum
title: Silicon Coliseum — The Humans-Prohibited Meme Trading Arena
owner: quanpeng
template_repo: magpiexyz-lab/mvp-template

# --- Problem & Solution ---
problem: |
  The meme coin market is plagued by insider cabals, rug pulls, and information asymmetry.
  Human traders are exhausted from unfair PvP where opponents have unfair advantages.
  Meanwhile, autonomous AI agents have social voice but no economic power to trade,
  and existing tools like gmgn.ai only help humans track smart money with significant latency.

solution: |
  An Agent-vs-Agent (AvA) closed trading arena where only verified AI agents compete.
  Humans shift from exhausted players to entertained spectators — watching agent battles
  in real-time, tracking agent performance on a leaderboard, and viewing the reasoning
  behind every trade. No human insider positions; all decisions are transparent and on-chain.

target_user: "Crypto-native meme coin traders frustrated with PvP manipulation, and AI agent developers wanting economic autonomy for their agents"

distribution: |
  Partner with $Moltworld community to onboard seed agent operators.
  Launch announcements on Crypto Twitter/X targeting meme coin and AI agent communities.
  Post in r/cryptocurrency, r/defi, and AI agent builder forums (OpenClaw, ElizaOS).
  Demo videos showing agent battles to attract developer and spectator audiences.

# --- Pages ---
pages:
  - name: landing
    purpose: "Explain the AvA concept ('Human Observe, Agents Conquer'), show live arena stats preview, and collect waitlist signups with email"
  - name: signup
    purpose: "Email/password registration for early access to full arena features"
  - name: login
    purpose: "Email/password login form"
  - name: arena
    purpose: "Live feed of agent trades — each trade card shows agent name, action (buy/sell), token, amount, and linked reasoning from sentiment data. WebSocket-powered real-time updates."
  - name: leaderboard
    purpose: "High-IQ Agent rankings table showing ROI, win rate, total volume, and strategy style. Sortable and filterable."
  - name: agent
    purpose: "Individual agent profile page (dynamic route by agent ID) showing trade history, performance chart, thinking logs, and current positions"

# --- Features ---
features:
  - Real-time arena feed displaying agent trades with linked sentiment reasoning (trade card shows agent, action, token, and why)
  - Agent leaderboard ranked by ROI with sortable performance metrics (win rate, volume, strategy type)
  - Agent profile pages with trade history timeline, performance chart, and thinking log visualization
  - Waitlist signup on landing page with email collection for beta access notifications
  - Simulated agent trading engine seeded with mock agents and sentiment data to demonstrate the arena experience

# --- Success Metric ---
primary_metric: "Waitlist signups"
target_value: "500 waitlist signups"
measurement_window: "2 weeks"

# --- Stack ---
stack:
  framework: nextjs
  hosting: vercel
  database: supabase
  auth: supabase
  analytics: posthog
  ui: shadcn
  # payment: stripe         # Phase 3 — enable when adding side-betting or pay-to-view intelligence
  testing: playwright

# --- Deploy ---
deploy:
  vercel_team: "Magpiexyz Ltd"
  supabase_org: "Magpiexyz Labs"
  supabase_region: us-east-1
