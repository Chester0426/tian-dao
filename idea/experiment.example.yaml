# --- Pages ---
pages:
  - name: landing
    purpose: Explain value prop ("Get paid faster"), show pricing, collect signups
  - name: signup
    purpose: Email/password registration form
  - name: login
    purpose: Email/password login form
  - name: dashboard
    purpose: List all invoices with status (draft, sent, paid, overdue) and total revenue
  - name: invoice-create
    purpose: Form to create a new invoice with line items, tax, and due date
  - name: invoice-view
    purpose: Public shareable invoice page with pay button (client-facing, no auth required)
  - name: settings
    purpose: Profile, business details, Stripe connection, account settings

# --- Golden Path ---
# The user journey from landing to value moment. Drives ux-journeyer, funnel tests, and plan reviews.
golden_path:
  - page: landing
    action: Click "Start Invoicing Free"
    event: visit_landing
  - page: signup
    action: Fill email + password, submit
    event: signup_start
  - page: dashboard
    action: Click "New Invoice"
    event: activate
  - page: invoice-create
    action: Fill line items, click "Send Invoice"
    event: null
    value_moment: true
target_clicks: 4

# --- Critical Flows (optional) ---
# Operational chains beyond the customer funnel. Drives integration tests.
critical_flows:
  - name: payment-fulfillment
    trigger: stripe webhook checkout.session.completed
    actor: system
    steps:
      - "Update invoice status to paid in database"
      - "Send payment confirmation email to freelancer"
      - "Send receipt email to client"
    verify: "invoices table has status='paid' AND 2 emails queued"
  - name: overdue-reminder
    trigger: cron daily
    actor: cron
    steps:
      - "Query invoices past due date with status='sent'"
      - "Send reminder email to client for each overdue invoice"
      - "Update invoice nudge_sent_at timestamp"
    verify: "overdue invoices have nudge_sent_at set AND reminder emails queued"

# --- Features ---
features:
  - Create invoices with line items, tax, and due date
  - Send invoice link to client via email
  - Stripe checkout for client payments
  - Dashboard showing invoice statuses and total revenue
  - Email reminders for overdue invoices (7 days past due)

# --- Success Metric ---
primary_metric: Paid invoices
target_value: "10 freelancers send at least 1 paid invoice"
measurement_window: 2 weeks

