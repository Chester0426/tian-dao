# experiment.yaml — Describe your MVP experiment
#
# RECOMMENDED: Run `/spec 'your idea'` in Claude Code — it fills this file
# automatically with hypotheses, behaviors, variants, and stack choices.
#
# ALTERNATIVE: Fill in manually. Replace every "TODO" value with your content.
# See idea/experiment.example.yaml for a complete worked example.
#
# When you're done (either way), run: make validate → /bootstrap

# --- Identity ---
name: TODO                  # Lowercase slug, hyphens only (e.g., "quick-bill"). Used in analytics.
title: TODO                 # Human-readable title (e.g., "QuickBill — Fast Invoicing for Freelancers")
owner: TODO                 # Your name or handle (e.g., "sarah"). Used in analytics.
template_repo: magpiexyz-lab/mvp-template  # GitHub repo where retro feedback is filed
# type: web-app               # Product archetype (default: web-app). See .claude/archetypes/
# level: 2                    # Experiment scope: 1 (landing test), 2 (interactive MVP), 3 (full MVP).
                               # /spec sets this automatically. Manual: omit to let /bootstrap infer from stack.
# quality: production          # Uncomment for TDD, per-task implementer, spec review.
                               # Default (absent): MVP mode — smoke tests, fast iteration.
                               # Use /harden to analyze existing code before upgrading.

# --- Problem & Solution ---
problem: |
  TODO: Describe the pain point in 1-3 sentences.
  Who has this problem? How do they cope today?



solution: |
  TODO: Describe your proposed solution in 1-3 sentences.
  What does the user get that they don't have today?



target_user: "TODO: Be specific (e.g., freelance designers billing <5 clients/month)"

distribution: |
  TODO: How will you get this in front of target users?
  e.g., Post in r/freelance, Indie Hackers, LinkedIn outreach



# --- Thesis (optional — generated by /spec) ---
# thesis: "If [action], then [outcome], as measured by [metric]"

# --- Hypotheses (optional — generated by /spec) ---
# Structured experiment design. Each hypothesis is a testable prediction.
# /spec generates these from your problem statement. Skip if filling in manually.
# hypotheses:
#   - id: h_demand_1
#     category: demand          # demand | reach | feasibility | monetize | retain
#     statement: "TODO: Testable prediction with specific numbers"
#     test_method: "TODO: How to test (e.g., landing page CTA clicks)"
#     success_metric: "TODO: What to measure"
#     threshold: "TODO: Pass/fail number (e.g., >5% CTR)"
#     priority_score: 8         # 1-10, higher = test first
#     experiment_level: 1       # Minimum level needed to test this
#     status: pending           # pending | resolved

# --- Behaviors (optional — generated by /spec) ---
# Given/when/then specifications derived from hypotheses.
# Each behavior IS a feature requirement — they replace the features list.
# behaviors:
#   - id: b_1
#     hypothesis_id: h_demand_1
#     given: "TODO: Initial condition"
#     when: "TODO: User action or trigger"
#     then: "TODO: Observable, measurable outcome"
#     level: 1

# --- Variants (optional) ---
# Test different messaging for the same product. Each variant gets its own
# landing page URL (/v/<slug>) and its own ad group in the distribution channel.
# Omit this section for a single-variant experiment (the default).
# variants:
#   - slug: TODO
#     headline: "TODO: Value proposition variant A"
#     subheadline: "TODO: How it works, variant A"
#     cta: "TODO: Action verb + outcome"
#     promise: "TODO: Core benefit in one phrase"         # generated by /spec
#     proof: "TODO: Evidence or credibility signal"       # generated by /spec
#     urgency: "TODO: Why act now"                        # generated by /spec
#     pain_points:
#       - "TODO: Pain point 1"
#       - "TODO: Pain point 2"
#       - "TODO: Pain point 3"
#     default: true
#   - slug: TODO
#     headline: "TODO: Value proposition variant B"
#     subheadline: "TODO: How it works, variant B"
#     cta: "TODO: Action verb + outcome"
#     promise: "TODO: Core benefit in one phrase"         # generated by /spec
#     proof: "TODO: Evidence or credibility signal"       # generated by /spec
#     urgency: "TODO: Why act now"                        # generated by /spec
#     pain_points:
#       - "TODO: Pain point 1"
#       - "TODO: Pain point 2"
#       - "TODO: Pain point 3"

# --- Pages ---
# List every page in the app. Claude will create exactly these pages, no more.
# "landing" is required — it's your home page.
# The "name" becomes the URL route (e.g., name: dashboard → /dashboard, name: invoice-create → /invoice-create).
# "landing" is special — it maps to / (the root page).
pages:
  - name: landing
    purpose: "TODO: What does the landing page do? (e.g., Explain value prop, collect signups)"
  # Add more pages below. Examples:
  # - name: dashboard
  #   purpose: Show main app view after login
  # - name: settings
  #   purpose: Account and billing settings



# --- Golden Path ---
# The user journey from landing to value moment. Drives ux-journeyer, funnel tests, and plan reviews.
# Each step: page name (from pages list), user action, analytics event (from EVENTS.yaml), and whether it's the value moment.
golden_path:
  - page: landing
    action: "TODO: What does the user click? (e.g., Click 'Get Started')"
    event: visit_landing
  - page: TODO
    action: "TODO: What action delivers value?"
    event: activate
    value_moment: true
target_clicks: 3

