# EVENTS.yaml — Assayer Analytics Event Dictionary
#
# All events are sent via the analytics library (see analytics stack file for path).
# Every event automatically includes global_properties.
# Event names are snake_case. Custom events follow: <object>_<action>.

global_properties:
  experiment_name:
    description: Hardcoded to "assayer". Identifies this platform in the shared PostHog project.
    type: string
    required: true
  experiment_id:
    description: Hardcoded to "platform". Distinguishes platform-level events from user experiment events.
    type: string
    required: true

events:
  visit_landing:
    funnel_stage: reach
    trigger: User loads the landing page
    properties:
      variant:
        type: string
        required: false
        description: Variant slug from experiment.yaml variants (e.g., "verdict-machine")
      referrer:
        type: string
        required: false
        description: Document referrer URL (document.referrer)
      utm_source:
        type: string
        required: false
        description: UTM source parameter from URL
      utm_medium:
        type: string
        required: false
        description: UTM medium parameter from URL
      utm_campaign:
        type: string
        required: false
        description: UTM campaign parameter from URL
      utm_content:
        type: string
        required: false
        description: UTM content parameter from URL (variant attribution and ad creative tracking)
      gclid:
        type: string
        required: false
        description: Google Click ID from URL (for offline conversion matching)
      click_id:
        type: string
        required: false
        description: Channel-specific click identifier (e.g., gclid, twclid, rdt_cid)

  cta_click:
    funnel_stage: demand
    trigger: User clicks the primary CTA button on the landing page
    properties:
      variant:
        type: string
        required: false
        description: Variant slug active when CTA was clicked
      cta_text:
        type: string
        required: true
        description: Text of the CTA button clicked (e.g., "Test My Idea")

  signup_start:
    funnel_stage: demand
    trigger: User opens the signup modal or registration form
    properties:
      method:
        type: string
        required: true
        description: "Signup method: email, google, github"

  signup_complete:
    funnel_stage: demand
    trigger: User successfully creates an account
    properties:
      method:
        type: string
        required: true
        description: "Signup method: email, google, github"

  spec_generated:
    funnel_stage: activate
    trigger: AI spec generation completes (SSE stream finishes)
    properties:
      anonymous:
        type: boolean
        required: true
        description: Whether the spec was generated by an anonymous (not logged in) user
      idea_length:
        type: integer
        required: true
        description: Character count of the submitted idea text
      generation_time_ms:
        type: integer
        required: true
        description: Time in milliseconds from request to stream completion

  experiment_created:
    funnel_stage: activate
    trigger: User approves a spec and creates an experiment for deployment
    properties:
      experiment_id:
        type: string
        required: true
        description: ID of the created experiment
      level:
        type: integer
        required: true
        description: Experiment level (1=Pitch, 2=Prototype, 3=Product)

  activate:
    funnel_stage: activate
    trigger: User completes the core activation action (generating a spec)
    properties:
      action:
        type: string
        required: true
        description: Specific action taken (e.g., "spec_generated", "experiment_launched")
      fake_door:
        type: boolean
        required: false
        description: True when the feature is a Fake Door (intent tracking only)

  pay_start:
    funnel_stage: monetize
    requires: [payment]
    trigger: User clicks upgrade/subscribe and enters checkout flow
    properties:
      plan:
        type: string
        required: true
        description: Plan name (e.g., "pro")
      amount_cents:
        type: integer
        required: true
        description: Price in cents (e.g., 2900 for $29.00)

  pay_success:
    funnel_stage: monetize
    requires: [payment]
    trigger: Payment confirmed via Stripe webhook
    properties:
      plan:
        type: string
        required: true
        description: Plan name (e.g., "pro")
      amount_cents:
        type: integer
        required: true
        description: Price in cents
      provider:
        type: string
        required: true
        description: "Payment provider: stripe"

  checkout_started:
    funnel_stage: monetize
    requires: [payment]
    trigger: Stripe checkout session is created and user is redirected
    properties:
      plan:
        type: string
        required: true
        description: Plan name (e.g., "pro")
      amount_cents:
        type: integer
        required: true
        description: Price in cents

  payment_complete:
    funnel_stage: monetize
    requires: [payment]
    trigger: Stripe checkout.session.completed webhook received
    properties:
      plan:
        type: string
        required: true
        description: Plan name (e.g., "pro")
      amount_cents:
        type: integer
        required: true
        description: Price in cents
      provider:
        type: string
        required: true
        description: "Payment provider: stripe"

  retain_return:
    funnel_stage: retain
    trigger: User returns to the app after 24+ hours since last visit
    properties:
      days_since_last:
        type: integer
        required: true
        description: Days since previous visit (rounded down)

  # Custom events (not tied to a specific funnel stage)
  verdict_delivered:
    funnel_stage: activate
    trigger: System delivers a SCALE/REFINE/PIVOT/KILL verdict for an experiment
    properties:
      experiment_id:
        type: string
        required: true
        description: ID of the experiment receiving the verdict
      verdict:
        type: string
        required: true
        description: "Verdict value: scale, refine, pivot, kill"
      confidence:
        type: number
        required: true
        description: Statistical confidence level (0.0 to 1.0)

  distribution_launched:
    funnel_stage: activate
    trigger: User launches distribution campaigns for an experiment
    properties:
      experiment_id:
        type: string
        required: true
        description: ID of the experiment
      channels:
        type: string
        required: true
        description: Comma-separated list of channels (e.g., "google,meta,reddit")

  experiment_viewed:
    funnel_stage: activate
    trigger: User views an experiment's scorecard page
    properties:
      experiment_id:
        type: string
        required: true
        description: ID of the viewed experiment

  lab_viewed:
    funnel_stage: activate
    trigger: User views the lab (portfolio) page
    properties:
      experiment_count:
        type: integer
        required: true
        description: Number of experiments in the user's portfolio

  change_request_submitted:
    funnel_stage: activate
    trigger: User submits a change request for a running experiment
    properties:
      experiment_id:
        type: string
        required: true
        description: ID of the experiment being changed
      change_type:
        type: string
        required: true
        description: "Type of change: pivot_variant, adjust_budget, extend_timeline, pause, resume"
