# experiment.yaml — Describe your MVP experiment
#
# RECOMMENDED: Run `/spec 'your idea'` in Claude Code — it fills this file
# automatically with hypotheses, behaviors, variants, and stack choices.
#
# ALTERNATIVE: Fill in manually. Replace every "TODO" value with your content.
# See idea/experiment.example.yaml for a complete worked example.
#
# When you're done (either way), run: make validate → /bootstrap

# --- 1. Identity ---
name: TODO                  # Lowercase slug, hyphens only (e.g., "quick-bill"). Used in analytics.
# type: web-app               # Product archetype (default: web-app). See .claude/archetypes/
# level: 2                    # Experiment scope: 1 (Pitch), 2 (Prototype), 3 (Product).
                               # /spec sets this automatically. Manual: omit to let /bootstrap infer from stack.
status: draft
# quality: production          # Uncomment for TDD, per-task implementer, spec review.
                               # Default (absent): MVP mode — smoke tests, fast iteration.
                               # Use /harden to analyze existing code before upgrading.

# --- 2. Intent ---
description: |
  TODO: Describe the problem and your proposed solution in 2-3 sentences.
  Who has this problem? What does the user get that they don't have today?

thesis: "TODO: If [action], then [outcome], as measured by [metric]"
target_user: "TODO: Be specific (e.g., freelance designers billing <5 clients/month)"

distribution: |
  TODO: How will you get this in front of target users?
  e.g., Post in r/freelance, Indie Hackers, LinkedIn outreach

# hypotheses:
#   - id: h-01
#     category: demand          # demand | reach | feasibility | monetize | retain
#     statement: "TODO: Testable prediction with specific numbers"
#     metric:
#       formula: "TODO: event_a / event_b"    # References EVENTS.yaml event names
#       threshold: 0.05                        # Numeric target (e.g., 0.05 = 5%)
#       operator: gte                          # gt | gte | lt | lte
#     priority_score: 90        # 0-100, higher = test first
#     experiment_level: 1       # Minimum level needed to test this
#     depends_on: []
#     status: pending           # pending | resolved

# --- 3. Behaviors ---
# Given/when/then specifications derived from hypotheses.
# Each behavior IS a feature requirement — they replace the features list.
# behaviors:
#   - id: b-01
#     hypothesis_id: h-01
#     given: "TODO: Initial condition"
#     when: "TODO: User action or trigger"
#     then: "TODO: Observable, measurable outcome"
#     tests:
#       - "TODO: Verification assertion"
#     level: 1
#   # System behavior example:
#   - id: b-05
#     actor: system             # system | cron (default: user)
#     trigger: "TODO: What starts this (e.g., stripe webhook checkout.session.completed)"
#     hypothesis_id: h-03
#     given: "TODO: Initial condition"
#     when: "TODO: System event"
#     then: "TODO: Observable outcome"
#     tests:
#       - "TODO: Verification assertion"
#     level: 3

# --- 4. Journey ---
# The user journey from landing to value delivery.
# Drives ux-journeyer, funnel tests, and plan reviews.
golden_path:
  - step: "TODO: What happens first (e.g., Visit landing page)"
    event: visit_landing
    page: landing
  - step: "TODO: What action delivers value?"
    event: activate
    page: TODO
target_clicks: 3

# --- 5. Variants (optional) ---
# Test different messaging for the same product. Each variant gets its own
# landing page URL (/v/<slug>) and its own ad group in the distribution channel.
# Omit this section for a single-variant experiment (the default).
# variants:
#   - slug: TODO
#     headline: "TODO: Value proposition variant A"
#     subheadline: "TODO: How it works, variant A"
#     cta: "TODO: Action verb + outcome"
#     promise: "TODO: Core benefit in one phrase"         # generated by /spec
#     proof: "TODO: Evidence or credibility signal"       # generated by /spec
#     urgency: "TODO: Why act now"                        # generated by /spec
#     pain_points:
#       - "TODO: Pain point 1"
#       - "TODO: Pain point 2"
#       - "TODO: Pain point 3"
#   - slug: TODO
#     headline: "TODO: Value proposition variant B"
#     subheadline: "TODO: How it works, variant B"
#     cta: "TODO: Action verb + outcome"
#     promise: "TODO: Core benefit in one phrase"         # generated by /spec
#     proof: "TODO: Evidence or credibility signal"       # generated by /spec
#     urgency: "TODO: Why act now"                        # generated by /spec
#     pain_points:
#       - "TODO: Pain point 1"
#       - "TODO: Pain point 2"
#       - "TODO: Pain point 3"

# --- 6. Funnel ---
# Dimension thresholds are derived from the highest-priority hypothesis per category.
# funnel:
#   available_from:
#     reach: L1
#     demand: L1
#     activate: L2
#     monetize: L2
#     retain: L3
#   decision_framework:
#     scale: "All tested dimensions >= 1.0"
#     kill: "Any top-funnel (REACH or DEMAND) < 0.5"
#     pivot: "2+ dimensions < 0.8"
#     refine: "1+ dimensions < 1.0 but fewer than 2 below 0.8"

# --- 7. Stack + Deploy ---
# Per-service values (runtime, hosting, ui, testing) live under services[].
# Shared values (database, auth, analytics, payment) live directly under stack.
# Each value maps to a stack file at .claude/stacks/<category>/<value>.md
stack:
  services:
    - name: app
      runtime: nextjs          # Web framework — leave default
      hosting: vercel           # Where the app is deployed — leave default
      ui: shadcn               # UI component library — leave default
      testing: playwright      # Page-load smoke tests — created by bootstrap
  database: supabase           # Database and backend — leave default
  auth: supabase               # Login/signup system — leave default
  # auth_providers:            # OAuth providers (e.g., [google, github]). Omit for email-only auth.
  #   - google
  #   - github
  analytics: posthog           # Usage tracking — leave default
  # payment: stripe            # Uncomment if your experiment involves payments
  # email: resend              # Uncomment for welcome email + activation nudge

deploy:
  url: null
  repo: null
