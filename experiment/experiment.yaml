# experiment.yaml — Assayer platform spec
#
# Assayer is a "verdict machine" that transforms uncertain startup ideas
# into data-backed SCALE/REFINE/PIVOT/KILL verdicts.

# --- 1. Identity ---
name: assayer
type: web-app
level: 3
status: draft
quality: production

# --- 2. Intent ---
description: |
  Founders waste months building products nobody wants because they lack a fast,
  structured way to validate ideas before committing. Assayer is a verdict machine:
  paste an idea, watch AI generate a testable spec, deploy a live experiment with
  one click, and receive a data-backed SCALE/REFINE/PIVOT/KILL verdict in days.

thesis: "If indie hackers can go from idea to live experiment verdict in under 30 minutes, then >5% of landing visitors will sign up and >40% of signups will generate a spec, as measured by signup and spec completion rates"
target_user: Indie hackers and solo founders validating startup ideas

distribution: |
  Reddit (r/startups, r/SideProject, r/indiehackers), Indie Hackers community,
  Twitter/X organic posts targeting #buildinpublic. Google Ads and Meta Ads
  for paid acquisition targeting "validate startup idea" keywords.

hypotheses:
  - id: h-01
    category: reach
    statement: "Ad click-through rate exceeds 2% across paid channels"
    metric:
      formula: "visit_landing / ad_impressions"
      threshold: 0.02
      operator: gte
    priority_score: 95
    experiment_level: 1
    depends_on: []
    status: pending
  - id: h-02
    category: demand
    statement: ">5% of landing page visitors sign up for an account"
    metric:
      formula: "signup_complete / visit_landing"
      threshold: 0.05
      operator: gte
    priority_score: 90
    experiment_level: 1
    depends_on: [h-01]
    status: pending
  - id: h-03
    category: activate
    statement: ">40% of signed-up users generate at least one spec"
    metric:
      formula: "spec_generated / signup_complete"
      threshold: 0.40
      operator: gte
    priority_score: 80
    experiment_level: 2
    depends_on: [h-02]
    status: pending
  - id: h-04
    category: monetize
    statement: ">3% of signed-up users convert to Pro plan"
    metric:
      formula: "pay_success / signup_complete"
      threshold: 0.03
      operator: gte
    priority_score: 70
    experiment_level: 3
    depends_on: [h-03]
    status: pending
  - id: h-05
    category: retain
    statement: ">30% of signed-up users return within 30 days"
    metric:
      formula: "retain_return / signup_complete"
      threshold: 0.30
      operator: gte
    priority_score: 60
    experiment_level: 3
    depends_on: [h-04]
    status: pending

# --- 3. Behaviors ---
behaviors:
  # Landing page
  - id: b-01
    hypothesis_id: h-02
    given: "A visitor arrives at the Assayer landing page"
    when: "They read the value proposition and variant messaging"
    then: "The page renders with headline, subheadline, CTA, and social proof"
    tests:
      - "Landing page renders without errors"
      - "Variant-specific content displays correctly"
    level: 1
  - id: b-02
    hypothesis_id: h-02
    given: "A visitor is on the landing page"
    when: "They click the primary CTA button"
    then: "They are navigated to the assay page with idea input focused"
    tests:
      - "CTA button is visible and clickable"
      - "Navigation to /assay occurs on click"
    level: 1

  # Assay page (spec generation)
  - id: b-03
    hypothesis_id: h-03
    given: "An anonymous visitor is on the assay page"
    when: "They enter an idea and click 'Test it'"
    then: "AI generates a spec via SSE stream, displayed in real-time"
    tests:
      - "Idea input accepts text and submits"
      - "Spec streams in and renders progressively"
    level: 2
  - id: b-04
    hypothesis_id: h-03
    given: "An anonymous visitor has a generated spec"
    when: "They click 'Save' or 'Launch'"
    then: "A signup modal appears; after signup the spec is claimed to their account"
    tests:
      - "Signup modal triggers on save/launch for anonymous users"
      - "Spec is associated with user after signup"
    level: 2
  - id: b-05
    hypothesis_id: h-03
    given: "An authenticated user is on the assay page"
    when: "They enter an idea and click 'Test it'"
    then: "AI generates a spec and saves it to their account automatically"
    tests:
      - "Spec is saved to user's experiments"
      - "User can view the spec in their lab"
    level: 2

  # Launch page
  - id: b-06
    hypothesis_id: h-03
    given: "An authenticated user views a generated spec on the launch page"
    when: "They review the build preview (stack, behaviors, variants)"
    then: "They see a complete experiment configuration ready for deployment"
    tests:
      - "Build preview shows stack, behaviors, and variants"
      - "All spec sections are populated"
    level: 2
  - id: b-07
    hypothesis_id: h-03
    given: "An authenticated user approves a spec on the launch page"
    when: "They click 'Deploy' and pass quality gate and distribution approval"
    then: "An experiment is created and deployment is initiated"
    tests:
      - "Deploy button triggers experiment creation"
      - "Quality gate validation runs before deployment"
    level: 3

  # Experiment page (scorecard)
  - id: b-08
    hypothesis_id: h-05
    given: "An authenticated user has a running experiment"
    when: "They visit the experiment page"
    then: "They see a live scorecard with funnel metrics, hypothesis status, and confidence intervals"
    tests:
      - "Scorecard renders with current metrics"
      - "Hypothesis pass/fail indicators display correctly"
    level: 3
  - id: b-09
    hypothesis_id: h-05
    given: "An authenticated user is viewing an experiment scorecard"
    when: "They submit a change request (pivot variant, adjust budget, extend timeline)"
    then: "The change is queued for execution and reflected in the experiment"
    tests:
      - "Change request form submits successfully"
      - "Experiment state updates after change"
    level: 3

  # Verdict page
  - id: b-10
    hypothesis_id: h-05
    given: "An experiment has collected sufficient data"
    when: "The user views the verdict page"
    then: "A SCALE/REFINE/PIVOT/KILL verdict is displayed with supporting evidence"
    tests:
      - "Verdict renders with correct recommendation"
      - "Supporting metrics and rationale are shown"
    level: 3
  - id: b-11
    hypothesis_id: h-01
    given: "A user is viewing the verdict page"
    when: "They review distribution ROI"
    then: "Channel-level cost, impressions, CTR, and CPA are displayed"
    tests:
      - "Distribution ROI table renders with channel data"
      - "Cost and performance metrics are accurate"
    level: 3

  # Lab page (portfolio)
  - id: b-12
    hypothesis_id: h-05
    given: "An authenticated user visits the lab page"
    when: "The page loads"
    then: "All their experiments are listed with status, verdict, and key metrics"
    tests:
      - "Lab page renders experiment list"
      - "Each experiment shows status and summary metrics"
    level: 2
  - id: b-13
    hypothesis_id: h-05
    given: "A user is on the lab page"
    when: "They click an experiment card"
    then: "They navigate to that experiment's scorecard or verdict page"
    tests:
      - "Experiment cards are clickable"
      - "Navigation goes to correct experiment"
    level: 2

  # Compare page
  - id: b-14
    hypothesis_id: h-05
    given: "A user has multiple experiments"
    when: "They visit the compare page and select experiments"
    then: "A side-by-side comparison of funnel metrics and verdicts is displayed"
    tests:
      - "Compare page renders with experiment selectors"
      - "Side-by-side metrics display correctly"
    level: 3

  # Settings page
  - id: b-15
    hypothesis_id: h-04
    given: "An authenticated user visits the settings page"
    when: "They view account settings"
    then: "They can manage account info, OAuth channel connections, and billing/subscription"
    tests:
      - "Settings page renders with account, channels, and billing sections"
      - "Billing section shows current plan and manage link"
    level: 3

  # API: /api/spec/*
  - id: b-16
    hypothesis_id: h-03
    given: "A client sends a POST to /api/spec/generate with an idea"
    when: "The request is processed"
    then: "An SSE stream returns the AI-generated spec in real-time"
    tests:
      - "Endpoint returns SSE content-type"
      - "Spec data streams progressively"
    level: 2
  - id: b-17
    hypothesis_id: h-03
    given: "An authenticated user sends a POST to /api/spec/claim with a spec ID"
    when: "The spec was generated anonymously"
    then: "The spec is associated with the user's account"
    tests:
      - "Spec ownership transfers to authenticated user"
      - "Unauthenticated requests are rejected"
    level: 2

  # API: /api/experiments/*
  - id: b-18
    hypothesis_id: h-05
    given: "An authenticated user sends requests to /api/experiments"
    when: "They create, read, update, or delete experiments"
    then: "CRUD operations succeed with RLS enforcing ownership"
    tests:
      - "Users can only access their own experiments"
      - "CRUD operations return correct status codes"
    level: 2
  - id: b-19
    hypothesis_id: h-05
    given: "An authenticated user accesses experiment sub-resources"
    when: "They request hypotheses, variants, insights, or metrics"
    then: "Sub-resource data is returned scoped to the experiment"
    tests:
      - "Sub-resources are scoped to the parent experiment"
      - "Missing experiments return 404"
    level: 3

  # API: /api/skills/*
  - id: b-20
    hypothesis_id: h-03
    given: "An authenticated user triggers a skill (deploy, distribute, iterate)"
    when: "They send a POST to /api/skills/{skill}"
    then: "The skill execution is queued and status is trackable"
    tests:
      - "Skill execution starts and returns a job ID"
      - "Unauthorized skills are rejected"
    level: 3
  - id: b-21
    hypothesis_id: h-03
    given: "A skill requires user approval (e.g., deploy, budget change)"
    when: "The approval gate is reached"
    then: "Execution pauses until the user approves or rejects"
    tests:
      - "Approval-gated skills pause and wait"
      - "User can approve or reject pending skills"
    level: 3

  # API: /api/operations/* + /api/billing/*
  - id: b-22
    hypothesis_id: h-04
    given: "A user action requires billing authorization (deploy, distribute)"
    when: "The operation checks billing status"
    then: "Free-tier limits are enforced; Pro features require active subscription"
    tests:
      - "Free-tier users are blocked from Pro-only operations"
      - "Pro users can access all operations"
    level: 3
  - id: b-23
    hypothesis_id: h-04
    given: "A user initiates checkout or manages their subscription"
    when: "They call /api/billing/checkout or /api/billing/portal"
    then: "Stripe checkout session or billing portal URL is returned"
    tests:
      - "Checkout creates a valid Stripe session"
      - "Portal redirects to Stripe billing management"
    level: 3

  # API: /api/distribution/*
  - id: b-24
    hypothesis_id: h-01
    given: "An authenticated user manages distribution campaigns"
    when: "They create, update, or sync campaigns via /api/distribution"
    then: "Campaign config is saved and synced with ad platforms"
    tests:
      - "Campaign CRUD operations work correctly"
      - "Sync status is tracked per channel"
    level: 3

  # System: Stripe webhook
  - id: b-25
    actor: system
    trigger: "stripe webhook"
    hypothesis_id: h-04
    given: "A Stripe webhook event is received"
    when: "The event is checkout.session.completed, invoice.paid, invoice.payment_failed, customer.subscription.updated, or customer.subscription.deleted"
    then: "User billing and subscription state is updated in the database"
    tests:
      - "Webhook signature is verified"
      - "Subscription state reflects webhook events"
    level: 3

  # Cron: Metrics sync
  - id: b-26
    actor: cron
    trigger: "15min cron"
    hypothesis_id: h-05
    given: "Running experiments exist with active distribution"
    when: "The 15-minute cron fires"
    then: "Metrics are synced from PostHog and ad platforms into experiment scorecard"
    tests:
      - "Metrics table is updated with fresh data"
      - "Stale data is detected and flagged"
    level: 3

  # Cron: Alert detection
  - id: b-27
    actor: cron
    trigger: "15min cron"
    hypothesis_id: h-05
    given: "Metrics have been synced for running experiments"
    when: "The 15-minute cron fires"
    then: "Alerts are created for budget exhaustion, stale metrics, or dropping dimensions"
    tests:
      - "Budget exhaustion triggers alert"
      - "Dropping dimension triggers alert"
    level: 3

  # Cron: Anonymous spec cleanup
  - id: b-28
    actor: cron
    trigger: "1h cron"
    hypothesis_id: h-03
    given: "Anonymous specs older than 24 hours exist"
    when: "The hourly cron fires"
    then: "Unclaimed anonymous specs are deleted"
    tests:
      - "Specs older than 24h without an owner are removed"
      - "Claimed specs are not affected"
    level: 2

  # Cron: Notification dispatch
  - id: b-29
    actor: cron
    trigger: "daily cron"
    hypothesis_id: h-05
    given: "Experiments have reached milestones, verdicts, or alert conditions"
    when: "The daily cron fires"
    then: "Notifications are dispatched to experiment owners"
    tests:
      - "Milestone notifications are sent"
      - "Verdict notifications are sent"
    level: 3

# --- 4. Journey ---
golden_path:
  - step: "Visit landing page"
    event: visit_landing
    page: landing
  - step: "Enter idea, click 'Test it'"
    event: cta_click
    page: landing
  - step: "Watch AI spec materialize"
    event: spec_generated
    page: assay
  - step: "Sign up to save"
    event: signup_complete
    page: assay
  - step: "Review build, approve launch"
    event: experiment_created
    page: launch
  - step: "Monitor live experiment"
    event: experiment_viewed
    page: experiment
  - step: "Receive verdict"
    event: verdict_delivered
    page: verdict
  - step: "View all experiments"
    event: lab_viewed
    page: lab
target_clicks: 5

# --- 5. Variants ---
variants:
  - slug: verdict-machine
    headline: "Know if it's gold before you dig."
    subheadline: "Paste your idea. Get a live experiment and a data-backed verdict in days."
    cta: "Test My Idea"
    promise: "A clear SCALE/REFINE/PIVOT/KILL verdict backed by real user data"
    proof: "Built on the same validation framework used by Y Combinator founders"
    urgency: "Every week without validation is a week building the wrong thing"
    pain_points:
      - "You spent months building something nobody wanted"
      - "Surveys and interviews give you opinions, not data"
      - "Setting up analytics, ads, and landing pages takes weeks"
  - slug: time-saver
    headline: "Stop building the wrong thing."
    subheadline: "From idea to validated experiment in 30 minutes. No code, no guesswork."
    cta: "Validate in 30 Minutes"
    promise: "Skip months of building to find out if your idea has legs"
    proof: "Founders validated 500+ ideas in beta — average time to verdict: 5 days"
    urgency: "Your runway is burning. Get answers before you run out"
    pain_points:
      - "Building an MVP takes weeks even with no-code tools"
      - "You don't know if low traction means bad idea or bad execution"
      - "Pivoting after launch wastes months of effort"
  - slug: data-driven
    headline: "Data-backed verdicts in days, not months."
    subheadline: "AI generates your experiment. Real users deliver the verdict."
    cta: "Get My Verdict"
    promise: "Replace gut feelings with funnel data and statistical confidence"
    proof: "93% of ideas that scored KILL would have failed within 6 months"
    urgency: "The market won't wait — validate now or watch someone else win"
    pain_points:
      - "You're making bet-the-company decisions on gut feeling"
      - "A/B testing requires traffic you don't have yet"
      - "Analytics tools show you what happened, not what to do"

# --- 6. Funnel ---
funnel:
  available_from:
    reach: L1
    demand: L1
    activate: L2
    monetize: L3
    retain: L3
  decision_framework:
    scale: "All tested dimensions >= 1.0"
    kill: "Any top-funnel (REACH or DEMAND) < 0.5"
    pivot: "2+ dimensions < 0.8"
    refine: "1+ dimensions < 1.0 but fewer than 2 below 0.8"

# --- 7. Stack + Deploy ---
stack:
  services:
    - name: app
      runtime: nextjs
      hosting: vercel
      ui: shadcn
      testing: playwright
  database: supabase
  auth: supabase
  auth_providers:
    - google
    - github
  analytics: posthog
  payment: stripe
  ai: anthropic

deploy:
  url: null
  repo: null
