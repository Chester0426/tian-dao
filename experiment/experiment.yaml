# experiment.yaml — 仙途放置 (Xian Idle)

# --- 1. Identity ---
name: xian-idle
owner: Chester0426
type: web-app
level: 3                       # L3: Full MVP — auth + complete features
status: draft

# --- 2. Intent ---
description: |
  Web3 gamers lack idle games with meaningful on-chain ownership. Existing chain games
  require constant attention or are pure DeFi with game skins. Xian Idle is a
  cultivation-themed (修仙) idle RPG where players mine resources, cultivate body strength,
  and progress through realms — all running while AFK. One idle action at a time.
  Core game state stays off-chain (Supabase) for speed and zero gas cost.
  Tradeable resources can be bridged on-chain as ERC-1155 tokens later (L3).

thesis: "If idle RPG players can progress meaningfully while AFK via mining and cultivation, then 50+ users will reach 練體 5階 within 2 weeks, as measured by database progression records"
target_user: "Web3 gamers and idle/incremental game fans who want Melvor-like gameplay with cultivation theme and future on-chain asset ownership"

distribution: |
  Post in r/incremental_games, r/ethereum, r/web3gaming.
  Twitter/X threads in Web3 gaming communities.
  Discord servers for idle game enthusiasts (Melvor, Idle Slayer communities).
  Farcaster gaming channels.

hypotheses:
  - id: h-01
    category: demand
    statement: ">5% of visitors who see the landing page click 'Start Cultivating'"
    metric:
      formula: "cta_click / visit_landing"
      threshold: 0.05
      operator: gte
    priority_score: 90
    experiment_level: 1
    depends_on: []
    status: pending
  - id: h-02
    category: activate
    statement: ">30% of signed-up players start mining within 5 minutes"
    metric:
      formula: "activate / signup_complete"
      threshold: 0.30
      operator: gte
    priority_score: 80
    experiment_level: 2
    depends_on: [h-01]
    status: pending
  - id: h-03
    category: retain
    statement: ">40% of players who mine return after 24 hours to collect idle rewards"
    metric:
      formula: "retain_return / activate"
      threshold: 0.40
      operator: gte
    priority_score: 70
    experiment_level: 2
    depends_on: [h-02]
    status: pending
  # h-04 (monetize — on-chain bridging) deferred to L3

# --- 3. Behaviors ---
behaviors:
  - id: b-01
    hypothesis_id: h-01
    given: "A visitor lands on the Xian Idle landing page"
    when: "They see the cultivation-themed ink wash UI and idle gameplay pitch"
    then: "They click 'Start Cultivating' CTA (>5% of visitors)"
    tests:
      - "Landing page renders with ink wash cultivation theme"
      - "CTA button is visible and clickable"
    level: 1
  - id: b-02
    hypothesis_id: h-01
    given: "A visitor clicks the CTA"
    when: "They sign up with email"
    then: "Account is created with initial state: 練體1階, 20 inventory slots, empty inventory"
    tests:
      - "Signup form validates email input"
      - "User is redirected to dashboard after signup"
      - "Player record created with correct initial state"
    level: 2
  - id: b-03
    hypothesis_id: h-02
    given: "A new player is on the dashboard"
    when: "They navigate to 枯竭礦脈 and click 'Begin Mining'"
    then: "Idle mining starts: every 3s one rock HP is consumed, random drop from loot table (煤 50%, 銅礦 35%, 靈石碎片 15%), player gains mining skill XP + mastery XP + 練體 XP"
    tests:
      - "Mining action fires every 3 seconds with correct drop probabilities"
      - "All three XP types (mining skill, mastery, 練體) are awarded per action"
      - "Items added to inventory (stackable, one slot per item type)"
    level: 2
  - id: b-04
    hypothesis_id: h-02
    given: "A player is actively mining"
    when: "Rock HP reaches 0"
    then: "Rock enters 5-second respawn cooldown, then reappears with full HP (1 + mastery level)"
    tests:
      - "Mining pauses when rock HP = 0"
      - "Rock respawns after 5 seconds with correct HP"
      - "Mining auto-resumes after respawn"
    level: 2
  - id: b-05
    hypothesis_id: h-02
    given: "A player has mining mastery >= 10 in 枯竭礦脈"
    when: "They mine a rock"
    then: "There is a (mastery_tier)% chance to receive double drops (10→1%, 20→2%, ... 90→9%, 99→15%)"
    tests:
      - "Double drop chance matches mastery tier table"
      - "Both drops follow the same loot table"
    level: 2
  - id: b-06
    hypothesis_id: h-02
    given: "A player has accumulated enough 練體 XP"
    when: "XP bar is full and they click 'Breakthrough'"
    then: "練體 advances to next stage (100% success for 練體 1-9), stats updated"
    tests:
      - "Breakthrough button only appears when XP is full"
      - "練體 stage increments by 1"
      - "XP resets for next stage"
    level: 2
  - id: b-07
    hypothesis_id: h-02
    given: "A player reaches 練體 9階 and breaks through"
    when: "Breakthrough to post-練體 phase"
    then: "練體 skill track (1-99, starting from 9) is unlocked, mining continues to feed 練體 skill XP"
    tests:
      - "練體 skill track visible after 練體9 breakthrough"
      - "Mining XP continues to contribute to 練體 skill"
    level: 2
  - id: b-08
    hypothesis_id: h-03
    given: "A player closes the browser while mining"
    when: "They return within 24 hours"
    then: "Offline progress is calculated: drops, XP (mining skill + mastery + 練體), rock HP cycles, capped at 24h"
    tests:
      - "Offline rewards match simulated time * action rate with rock respawn cycles"
      - "Progress capped at 24 hours"
      - "Summary screen shows all gains (drops, XP, 練體 progress)"
    level: 2
  - id: b-09
    hypothesis_id: h-02
    given: "A player's inventory is full (all slots occupied by different item types)"
    when: "They mine and get a new item type"
    then: "Item is lost or mining pauses (player must free a slot)"
    tests:
      - "Inventory respects slot limit"
      - "Player is notified when inventory is full"
    level: 2
  - id: b-10
    hypothesis_id: h-02
    given: "A player wants more inventory space"
    when: "They open the shop and purchase an extra slot with 靈石碎片"
    then: "Inventory capacity increases by 1, price increases for next slot"
    tests:
      - "Shop displays current slot price"
      - "Purchase deducts 靈石碎片 and adds 1 slot"
      - "Next slot price is higher"
    level: 2
  - id: b-11
    hypothesis_id: h-02
    given: "A logged-in player enters the game"
    when: "They reach the character selection screen"
    then: "They see 3 save slots — each empty or showing character summary (stage, mining level, last played)"
    tests:
      - "Character selection page shows 3 slots"
      - "Empty slots show 'Create' button"
      - "Occupied slots show character info and 'Load' button"
    level: 2
  - id: b-12
    hypothesis_id: h-03
    given: "A player selects an existing character"
    when: "They load the character after being offline"
    then: "Offline rewards are calculated (capped at 12 hours) and shown in a summary dialog before entering the game"
    tests:
      - "Offline rewards dialog shows time away, drops, and XP gained"
      - "Rewards capped at 12 hours"
      - "Player can dismiss dialog to enter dashboard"
    level: 2

# --- 4. Journey ---
golden_path:
  - step: "Visit landing page — see cultivation world and pitch"
    event: visit_landing
    page: landing
  - step: "Click 'Start Cultivating' and sign up with email"
    event: signup_complete
    page: signup
  - step: "Select or create a character from 3 save slots"
    event: activate
    page: characters
  - step: "Enter dashboard — see cultivation status and mining area"
    event: activate
    page: dashboard
  - step: "Navigate to 枯竭礦脈 and click 'Begin Mining'"
    event: mining_started
    page: mining
  - step: "Return later — collect offline rewards, breakthrough 練體"
    event: breakthrough_complete
    page: dashboard
target_clicks: 5

