# --- 6. Funnel ---
funnel:
  available_from:
    reach: L1
    demand: L1
    activate: L2
    monetize: L3
    retain: L2
  decision_framework:
    scale: "All tested dimensions >= 1.0"
    kill: "Any top-funnel (REACH or DEMAND) < 0.5"
    pivot: "2+ dimensions < 0.8"
    refine: "1+ dimensions < 1.0 but fewer than 2 below 0.8"

# --- 7. Stack + Deploy ---
stack:
  services:
    - name: app
      runtime: nextjs
      hosting: vercel
      ui: shadcn
      testing: playwright
  database: supabase
  auth: supabase
  analytics: posthog
  # payment: stripe            # L3: marketplace fees when on-chain trading is live

deploy:
  url: null
  repo: Chester0426/melvor-chain

# --- 8. Game Design (non-standard, reference for development) ---
# This section is not part of the mvp-template spec but documents game mechanics.
#
# == Cultivation System ==
# 練體 (Body Tempering): 9 stages
#   - XP sources: mining, future life skills
#   - Breakthrough: manual, 100% success rate
#   - After stage 9: unlocks 練體 skill track (levels 1-99, starting at 9)
# 練氣 (Qi Refining): 9 stages (future — not in MVP)
#   - Breakthrough: manual, has failure rate
#   - XP sources: TBD (different from life skills)
# 築基 (Foundation Building): (future — not in MVP)
#   - Requires 築基丹 (Foundation Pill)
#
# == Mining System ==
# Action interval: 3 seconds
# Drop mechanic: per-mine random loot from probability table
# Rock HP: base 1 + mastery level; when 0, 5s respawn
# Dual XP tracks:
#   - Mining skill level (1-99): unlocks new mines, XP varies per mine
#   - Mine mastery (1-99 per mine): improves efficiency, XP varies per mine
# Also grants: 練體 XP (same value as mining skill XP)
# XP curve: Melvor exponential — floor(1/4 * (L-1 + 300 * 2^((L-1)/7)))
# Mastery bonuses: 10→1%, 20→2%, 30→3%, 40→4%, 50→5%, 60→6%, 70→7%, 80→8%, 90→9%, 99→15% double drop
#
# First mine — 枯竭礦脈 (Depleted Vein):
#   煤 (Coal): 50%
#   銅礦 (Copper Ore): 35%
#   靈石碎片 (Spirit Stone Fragment): 15%
#   Skill XP / Mastery XP / 練體 XP: TBD per mine
#
# == Inventory System ==
# Initial slots: 20 (fixed, cannot be removed)
# Stacking: unlimited per slot, one item type per slot
# Expansion: shop purchase with 靈石碎片, 1 slot at a time, escalating price
# Future: bag items that add slots (potential on-chain NFT)
#
# == Save System ==
# 3 save slots per account (like Melvor Idle)
# Character selection screen after login
# Each slot is fully independent (separate inventory, skills, progress)
#
# == Idle / Offline ==
# Only one system active at a time
# Max offline accumulation: 12 hours
# On return: summary screen with all gains
#
# == UI ==
# Theme: ink wash (水墨風) cultivation aesthetic
# Auth: email login (Supabase)
